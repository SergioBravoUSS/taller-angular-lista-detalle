<h2 class="section-title">Lista de posts</h2>

<p>Total posts: {{ posts.length }}</p>

<p *ngIf="cargando">Cargando...</p>
<p *ngIf="error">{{ error }}</p>

<div class="post-list" *ngIf="!cargando && !error">
    <button *ngFor="let post of posts; trackBy: trackByPostId" type="button" class="post-button"
        [class.selected]="selectedId === post.id" (click)="seleccionarPost(post)">
        {{ post.title }}
    </button>
</div>
